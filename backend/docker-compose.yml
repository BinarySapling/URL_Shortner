version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports: ['80:80']
    volumes: ['./nginx/nginx.conf:/etc/nginx/nginx.conf:ro']
    depends_on: [shortener-service, redirector-service]

  shortener-service:
    build: ./shortener-service
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/urlshortener
      REDIS_URL: redis://redis:6379
      BASE_URL: ${BASE_URL}
    depends_on: [mongo, redis]
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }

  redirector-service:
    build: ./redirector-service
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/urlshortener
      REDIS_URL: redis://redis:6379
    depends_on: [mongo, redis]
    deploy:
      replicas: 3   # redirect traffic is higher — scale independently
      restart_policy: { condition: on-failure }

  mongo:
    image: mongo:7
    volumes: [mongo_data:/data/db]
    command: mongod --wiredTigerCacheSizeGB 1.5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]

volumes:
  mongo_data:
  redis_data: