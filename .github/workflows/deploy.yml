name: 🚀 Registry-Based Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  # Repo name in lowercase for registry compliance
  IMAGE_NAME: binarysapling/url_shortner

jobs:
  build-and-push:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🛠️ Build and Push (Compose)
        # Using buildx bake or just compose build + push
        # We'll use compose build then push to ensure all services in docker-compose are handled
        run: |
          docker compose build --parallel
          docker compose push

  deploy:
    name: 🚢 Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Pull/Swap
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            PROJECT_DIR="/home/${{ secrets.EC2_USERNAME }}/app"
            
            # 1. First-time setup check
            if [ ! -d "$PROJECT_DIR" ]; then 
              mkdir -p "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"

            if [ ! -d ".git" ]; then
              git init
              git remote add origin "https://github.com/${{ github.repository }}.git" || true
            fi

            # 2. Update code (only needed for docker-compose.yml and nginx config)
            git fetch origin main
            git reset --hard origin/main

            # 3. Log in to Registry on EC2
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 4. Pull and Swap (Instant)
            echo "Pulling new images..."
            sudo docker compose pull

            echo "Swapping containers..."
            sudo docker compose up -d --remove-orphans

            # 5. Cleanup
            sudo docker image prune -f
            echo "✅ Deployment Successfully Completed!"
