name: 🚀 Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            PROJECT_DIR="/home/${{ secrets.EC2_USERNAME }}/app"

            if [ ! -d "$PROJECT_DIR" ]; then
              mkdir -p "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # Auto-init if not a git repo
            if [ ! -d ".git" ]; then
              echo "=== Initializing Git Repo... ==="
              git init
              git remote add origin https://github.com/${{ github.repository }}.git || true
            fi

            echo "=== [1/4] Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/4] Building new images (sudo) ==="
            sudo docker compose build --parallel

            echo "=== [3/4] Swapping containers (sudo) ==="
            sudo docker compose up -d --remove-orphans --no-build

            echo "=== [4/4] Cleaning up (sudo) ==="
            sudo docker image prune -f
            echo "=== ✅ Deployment Successfully Completed! ==="
            sudo docker compose ps
