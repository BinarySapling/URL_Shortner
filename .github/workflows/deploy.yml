name: 🚀 Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # timeout for slow EC2 builds
          command_timeout: 10m
          script: |
            set -e

            # Matches your EC2 'app' folder
            PROJECT_DIR="/home/${{ secrets.EC2_USERNAME }}/app"

            # Auto-clone if it's the first time or folder was missing
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "=== Folder missing, cloning repo... ==="
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            echo "=== [1/4] Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/4] Building new images (containers still running) ==="
            docker compose build --parallel

            echo "=== [3/4] Swapping containers on same ports (zero extra ports) ==="
            # 'up -d' replaces each container in-place:
            # - Docker stops the old container
            # - Starts the new one on the identical port binding
            # - Nginx keeps serving; blip is ~1-2s per service
            docker compose up -d --remove-orphans --no-build

            echo "=== [4/4] Cleaning up dangling images ==="
            docker image prune -f

            echo "=== ✅ Deployment complete ==="
            docker compose ps
