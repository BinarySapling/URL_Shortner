worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Rate-limit zone for the shortener API
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  # Upstream pools
  upstream shortener  { server shortener-service:3001; }
  upstream redirector { server redirector-service:3002; }
  upstream frontend   { server frontend:3000; }

  server {
    listen 80;

    # ── Shorten API ─────────────────────────────────────────
    location ^~ /api/shorten {
      limit_req zone=api burst=20 nodelay;

      # Allow CORS from the browser
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://shortener;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── React frontend (SPA) ─────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;

      # Let the frontend container handle SPA routing
      proxy_intercept_errors off;
    }

    # ── Short-code redirects  /{code} ────────────────────────
    # Any alphanumeric path segment goes to the redirector service
    location ~ ^/[0-9A-Za-z]+$ {
      proxy_pass http://redirector;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_cache_bypass               $http_pragma;
      add_header X-Cache-Status        $upstream_cache_status;
    }
  }
}
