version: '3.9'

services:

  # ── Reverse proxy (public entry point) ─────────────────────
  nginx:
    image: ghcr.io/binarysapling/url_shortner/nginx:latest
    ports: ['80:80']
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - shortener-service
      - redirector-service
    restart: unless-stopped

  # ── React frontend ──────────────────────────────────────────
  frontend:
    image: ghcr.io/binarysapling/url_shortner/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  # ── Shortener microservice ──────────────────────────────────
  shortener-service:
    image: ghcr.io/binarysapling/url_shortner/shortener-service:latest
    build: ./backend/shortener-service
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      BASE_URL: ${BASE_URL}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      CACHE_TTL: ${CACHE_TTL:-86400}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY:-}
      HASHID_SALT: ${HASHID_SALT}
      HASHID_MIN_LENGTH: ${HASHID_MIN_LENGTH:-5}
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }

  # ── Redirector microservice ─────────────────────────────────
  redirector-service:
    image: ghcr.io/binarysapling/url_shortner/redirector-service:latest
    build: ./backend/redirector-service
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      CACHE_TTL: ${CACHE_TTL:-86400}
    deploy:
      replicas: 3
      restart_policy: { condition: on-failure }

  # NOTE: MongoDB and Redis are now cloud-managed services.
  # MongoDB → MongoDB Atlas  (MONGO_URI in .env)
  # Redis   → Upstash Redis  (REDIS_URL  in .env)
